<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CE422B"/>
      <stop offset="50%" style="stop-color:#F07733"/>
      <stop offset="100%" style="stop-color:#CE422B"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#F07733"/>
      <stop offset="100%" style="stop-color:#CE422B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1c2128" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>
  <rect width="900" height="200" fill="url(#grid)" opacity="0.6"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)"/>

  <!-- Left rust gear decoration -->
  <g opacity="0.07" transform="translate(820, 100)">
    <circle r="55" fill="none" stroke="#F07733" stroke-width="8"/>
    <circle r="38" fill="none" stroke="#F07733" stroke-width="4"/>
    <circle r="12" fill="#F07733"/>
    <rect x="-8" y="-70" width="16" height="30" rx="3" fill="#F07733"/>
    <rect x="-8" y="40" width="16" height="30" rx="3" fill="#F07733"/>
    <rect x="40" y="-8" width="30" height="16" rx="3" fill="#F07733"/>
    <rect x="-70" y="-8" width="30" height="16" rx="3" fill="#F07733"/>
    <rect x="28" y="-55" width="16" height="30" rx="3" fill="#F07733" transform="rotate(45)"/>
    <rect x="-44" y="-55" width="16" height="30" rx="3" fill="#F07733" transform="rotate(-45)"/>
  </g>

  <!-- Cargo crab decoration (simplified) -->
  <g opacity="0.06" transform="translate(75, 100)">
    <circle r="50" fill="#CE422B"/>
    <circle r="35" fill="#0d1117"/>
    <circle r="20" fill="#CE422B"/>
  </g>

  <!-- Bracket decoration left -->
  <text x="30" y="120" font-family="'Courier New', monospace" font-size="80" fill="#CE422B" opacity="0.15" font-weight="bold">[</text>
  <!-- Bracket decoration right -->
  <text x="840" y="120" font-family="'Courier New', monospace" font-size="80" fill="#CE422B" opacity="0.15" font-weight="bold">]</text>

  <!-- Main title -->
  <text x="450" y="85" font-family="'Courier New', Courier, monospace" font-size="13" fill="#6e7681" text-anchor="middle" letter-spacing="4">[PACKAGE]</text>
  <text x="450" y="132" font-family="'Courier New', Courier, monospace" font-size="36" fill="url(#titleGrad)" text-anchor="middle" font-weight="bold" filter="url(#subtleglow)">aditya-sehrawat</text>
  <text x="450" y="158" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8b949e" text-anchor="middle">Rust &amp; Solana Backend Engineer  ·  Systems Builder  ·  Web3 Architect</text>

  <!-- Version badge -->
  <rect x="370" y="168" width="160" height="22" rx="11" fill="#CE422B" opacity="0.2"/>
  <rect x="370" y="168" width="160" height="22" rx="11" fill="none" stroke="#CE422B" stroke-width="1" opacity="0.5"/>
  <text x="450" y="183" font-family="'Courier New', Courier, monospace" font-size="11" fill="#F07733" text-anchor="middle">version = "22.0.0" · edition = "2026"</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="197" width="900" height="3" fill="url(#accent)"/>
</svg>
